name: CSC4005 Lab0 Check

on:
  push:
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run environment check
        run: python check_env.py

      - name: Run smoke test
        run: python run_smoke_test.py

      - name: Verify outputs
        run: |
          test -f outputs/logs/env_check.txt
          test -f outputs/logs/smoke_test_log.txt
          test -f outputs/figures/loss_curve.png
          test -f outputs/checkpoints/smoke_model.pt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lab0-artifacts
          path: |
            outputs/logs/env_check.txt
            outputs/logs/smoke_test_log.txt
            outputs/figures/loss_curve.png
            outputs/checkpoints/smoke_model.pt
